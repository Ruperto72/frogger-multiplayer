<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frog vs Toad</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preload" href="fonts/press-start-2p.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="start" class="lobby">
    <div class="lang-switch">
      <button id="lang-sv">SV</button>
      <button id="lang-en">EN</button>
    </div>
    <h1>Frog vs Toad</h1>
    <input id="start-name" maxlength="20" placeholder="Ditt namn" autocomplete="nickname" data-i18n-placeholder="start.namePlaceholder">
    <div class="skins" id="start-skins">
      <button class="skin" data-skin="green" aria-label="Grön" data-i18n-aria="skin.green"></button>
      <button class="skin" data-skin="yellow" aria-label="Gul" data-i18n-aria="skin.yellow"></button>
      <button class="skin" data-skin="blue" aria-label="Blå" data-i18n-aria="skin.blue"></button>
    </div>
    <button id="start-quick" class="primary" data-i18n="start.quick">Snabbmatch</button>
    <div class="start-row">
      <select id="start-size"></select>
      <select id="start-bestof">
        <option value="1" data-i18n="start.bestof1">Bäst av 1</option>
        <option value="3" selected data-i18n="start.bestof3">Bäst av 3</option>
        <option value="5" data-i18n="start.bestof5">Bäst av 5</option>
      </select>
    </div>
    <button id="start-create" class="primary" data-i18n="start.create">Skapa turnering</button>
    <div class="start-row">
      <input id="start-code" maxlength="4" placeholder="KOD" data-i18n-placeholder="start.codePlaceholder">
      <button id="start-join" class="primary" data-i18n="start.join">Gå med</button>
    </div>
    <p id="start-error" class="error"></p>
  </div>
  <div id="lobby" class="lobby">
    <h1>Frog vs Toad</h1>
    <p id="lobby-status" data-i18n="lobby.waiting">Väntar på motspelare…</p>
    <input id="lobby-name" maxlength="20" placeholder="Ditt namn" autocomplete="nickname" data-i18n-placeholder="start.namePlaceholder">
    <div class="skins" id="lobby-skins">
      <button class="skin" data-skin="green" aria-label="Grön" data-i18n-aria="skin.green"></button>
      <button class="skin" data-skin="yellow" aria-label="Gul" data-i18n-aria="skin.yellow"></button>
      <button class="skin" data-skin="blue" aria-label="Blå" data-i18n-aria="skin.blue"></button>
    </div>
    <button id="lobby-ready" disabled data-i18n="lobby.readyBtn">Redo</button>
    <p id="lobby-opponent"></p>
  </div>
  <div id="tournament" class="lobby hidden">
    <h1 data-i18n="t.title">Turnering</h1>
    <p class="code-row"><span data-i18n="t.codeLabel">Kod:</span> <strong id="t-code"></strong> <button id="t-copy" data-i18n="t.copy">Kopiera länk</button></p>
    <div id="t-players"></div>
    <button id="t-start" class="primary hidden" data-i18n="t.start">Lotta &amp; starta</button>
    <div id="t-bracket" class="hidden"></div>
    <button id="t-ready" class="primary hidden" data-i18n="lobby.readyBtn">Redo</button>
    <p id="t-status"></p>
  </div>
  <canvas id="game"></canvas>
  <div id="touch-controls" class="hidden">
    <div class="tc-group tc-left">
      <button data-dir="left" aria-label="Vänster" data-i18n-aria="touch.left">◀</button>
      <button data-dir="right" aria-label="Höger" data-i18n-aria="touch.right">▶</button>
    </div>
    <div class="tc-group tc-right">
      <button data-dir="up" aria-label="Fram" data-i18n-aria="touch.up">▲</button>
      <button data-dir="down" aria-label="Bak" data-i18n-aria="touch.down">▼</button>
    </div>
  </div>
  <script src="js/main.js" type="module"></script>
</body>
</html>
