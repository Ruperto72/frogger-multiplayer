<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frogger Multiplayer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="lobby" class="lobby">
    <h1>Frogger Multiplayer</h1>
    <p id="lobby-status">Väntar på motspelare…</p>
    <input id="lobby-name" maxlength="20" placeholder="Ditt namn" autocomplete="nickname">
    <div class="skins" id="lobby-skins">
      <button class="skin" data-skin="green" aria-label="Grön"></button>
      <button class="skin" data-skin="yellow" aria-label="Gul"></button>
      <button class="skin" data-skin="blue" aria-label="Blå"></button>
    </div>
    <button id="lobby-ready" disabled>Redo</button>
    <p id="lobby-opponent"></p>
  </div>
  <canvas id="game"></canvas>
  <div id="touch-controls" class="hidden">
    <div class="tc-group tc-left">
      <button data-dir="left" aria-label="Vänster">◀</button>
      <button data-dir="right" aria-label="Höger">▶</button>
    </div>
    <div class="tc-group tc-right">
      <button data-dir="up" aria-label="Fram">▲</button>
      <button data-dir="down" aria-label="Bak">▼</button>
    </div>
  </div>
  <script src="js/main.js" type="module"></script>
</body>
</html>
